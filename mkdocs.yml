site_name: Playwright TypeScript QA Course
site_description: Course for Manual QA engineers moving to Automation QA with Playwright and TypeScript

theme:
  name: material
  language: ru
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

