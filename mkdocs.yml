        - 'Домашнее задание': 'modules/01-environment-node-npm-vscode-playwright/homework.md'
        - 'Чеклист': 'modules/01-environment-node-npm-vscode-playwright/checklist.md'
        - 'Ресурсы': 'modules/01-environment-node-npm-vscode-playwright/resources.md'
    - '02. Git и ветки':
        - 'Обзор': 'modules/02-git-branches-main-commands/index.md'
        - 'Домашнее задание': 'modules/02-git-branches-main-commands/homework.md'
        - 'Чеклист': 'modules/02-git-branches-main-commands/checklist.md'
        - 'Ресурсы': 'modules/02-git-branches-main-commands/resources.md'
